services:
  # ── Backend: Express + Socket.io ──────────────────────────────────────────
  - type: web
    name: sentinal-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # You will paste the value in the Render dashboard
      - key: JWT_SECRET
        sync: false          # You will paste the value in the Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your frontend URL after the static site is deployed

  # ── Frontend: Vite React (Static Site) ───────────────────────────────────
  - type: static
    name: sentinal-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to https://sentinal-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
